<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Yavaş Yavaş Sana</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div id="gameWrap">
    <canvas id="game"></canvas>
  </div>

  <div id="hud">
    <div class="pill" id="modePill">🐢 Bahçe</div>
    <div class="pill" id="basketPill">Sepet: 0 parça ❤️0</div>
    <div class="pill" id="timePill">Süre: -</div>
    <button class="miniBtn" id="restartBtn">↻</button>
  </div>

  <div id="message"></div>

  <div id="controls">
    <div id="joyArea">
      <div id="joyBase"></div>
      <div id="joyKnob">●</div>
      <div id="joyHint">sürükle</div>
    </div>

    <button class="gameBtn" id="actionBtn">BAŞLA</button>
  </div>

  <div id="overlay">
    <div class="card">
      <h1>Yavaş Yavaş Sana</h1>
      <p>
        Minik kaplumbağa piknik sepetini doldurmak için bahçeye çıkıyor.
        Çilek, limon, erik, yeşillik, zeytin ve brokoli onu bekliyor.
      </p>
      <button class="primary" id="startGame">Oyuna Başla 🐢</button>
      <div class="tiny">Telefonda joystick + BAŞLA/TOPLA.</div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
