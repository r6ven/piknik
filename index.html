<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Yavaş Yavaş Sana</title>
<style>
:root{--ink:#4b3b2f;--panel:rgba(255,250,235,.88);--shadow:rgba(92,64,40,.18)}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at top,#fff5cf 0%,#f9dcc4 42%,#cdeecb 100%);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);touch-action:none;overscroll-behavior:none}
#gameWrap{position:fixed;left:8px;right:8px;top:calc(env(safe-area-inset-top) + 78px);bottom:calc(env(safe-area-inset-bottom) + 112px)}
canvas{width:100%;height:100%;background:#dff3c8;border-radius:26px;box-shadow:0 18px 60px var(--shadow);border:4px solid rgba(255,255,255,.66);display:block}
#hud{position:fixed;top:calc(env(safe-area-inset-top) + 14px);left:50%;transform:translateX(-50%);width:calc(100vw - 16px);display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:6px;pointer-events:none;z-index:5}
.pill{background:var(--panel);border:1px solid rgba(255,255,255,.88);border-radius:999px;padding:8px 9px;box-shadow:0 10px 28px rgba(72,54,36,.12);font-size:clamp(12px,3.2vw,15px);backdrop-filter:blur(8px);white-space:nowrap;text-align:center;min-width:0;overflow:hidden;text-overflow:ellipsis}
#basketPill{font-weight:700}.miniBtn{pointer-events:auto;border:0;border-radius:999px;background:rgba(255,255,255,.82);box-shadow:0 10px 28px rgba(72,54,36,.12);padding:8px 10px;font-size:13px;font-weight:900;color:#4a392e}
#message{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 104px);transform:translateX(-50%);width:min(760px,calc(100vw - 36px));background:var(--panel);border:1px solid rgba(255,255,255,.9);border-radius:22px;padding:12px 14px;box-shadow:0 10px 32px rgba(72,54,36,.16);text-align:center;font-size:clamp(12px,3.2vw,15px);line-height:1.35;z-index:6;opacity:0;transition:opacity .25s ease,translate .25s ease;pointer-events:none}#message.show{opacity:1;translate:0 -6px}
#controls{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 8px);left:0;right:0;display:flex;justify-content:space-between;align-items:end;padding:0 12px;z-index:8;pointer-events:none}
#joyArea{width:138px;height:104px;position:relative;pointer-events:auto;touch-action:none}#joyBase{position:absolute;left:18px;bottom:6px;width:76px;height:76px;border-radius:50%;background:rgba(255,255,255,.55);box-shadow:0 8px 20px rgba(72,54,36,.13);border:1px solid rgba(255,255,255,.8)}#joyKnob{position:absolute;left:38px;bottom:26px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.9);box-shadow:0 6px 18px rgba(72,54,36,.16);border:1px solid rgba(80,60,40,.08);display:grid;place-items:center;font-weight:900;color:#5c4938}#joyHint{position:absolute;left:102px;bottom:36px;font-size:11px;opacity:.62;background:rgba(255,255,255,.45);border-radius:999px;padding:4px 7px;white-space:nowrap}
button.gameBtn{border:0;border-radius:22px;background:rgba(255,255,255,.78);box-shadow:0 8px 20px rgba(72,54,36,.14);color:#4a392e;font-size:15px;font-weight:900;width:124px;height:60px;pointer-events:auto;user-select:none;-webkit-user-select:none;letter-spacing:.3px}button:active{transform:translateY(2px) scale(.98)}
#overlay{position:fixed;inset:0;display:grid;place-items:center;z-index:20;background:linear-gradient(150deg,rgba(255,244,212,.94),rgba(217,245,201,.9));padding:20px}.hidden{display:none!important}.card{width:min(680px,94vw);background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.92);border-radius:34px;padding:26px;box-shadow:0 20px 70px rgba(83,58,38,.18);text-align:center;backdrop-filter:blur(9px)}.card h1{margin:0 0 8px;font-size:clamp(32px,7vw,58px);letter-spacing:-1px;color:#4f7f43}.card p{font-size:17px;line-height:1.48;margin:10px auto 20px;max-width:560px}.primary{border:0;background:#ffcf66;color:#513820;padding:14px 22px;border-radius:999px;font-weight:900;font-size:16px;box-shadow:0 9px 22px rgba(109,74,30,.18);cursor:pointer}.tiny{font-size:13px;opacity:.74;margin-top:14px}
@media (min-width:900px){#gameWrap{left:50%;right:auto;top:calc(env(safe-area-inset-top) + 78px);bottom:calc(env(safe-area-inset-bottom) + 24px);width:min(1100px,calc(100vw - 28px));transform:translateX(-50%)}#hud{width:min(1040px,calc(100vw - 22px))}#controls{opacity:.28}#controls:hover{opacity:1}}
</style>
</head>
<body>
<div id="gameWrap"><canvas id="game"></canvas></div>
<div id="hud"><div class="pill" id="modePill">🐢 Bahçe</div><div class="pill" id="basketPill">Sepet: 🍓0 🍋0 🟣0 ❤️0</div><div class="pill" id="timePill">Süre: -</div><button class="miniBtn" id="restartBtn">↻</button></div>
<div id="message"></div>
<div id="controls"><div id="joyArea"><div id="joyBase"></div><div id="joyKnob">●</div><div id="joyHint">sürükle</div></div><button class="gameBtn" id="actionBtn">BAŞLA</button></div>
<div id="overlay"><div class="card"><h1>Yavaş Yavaş Sana</h1><p>Minik kaplumbağa tatlı bir piknik sepeti hazırlıyor. Çilekte hafızanı kullan, limonları dallardan yakala, erik labirentinde engellerden kaç.</p><button class="primary" id="startGame">Oyuna Başla 🐢</button><div class="tiny">Klavye: yön tuşları/WASD + E. Telefonda joystick + BAŞLA/TOPLA.</div></div></div>
<script>
(()=>{
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),overlay=document.getElementById('overlay'),startGameBtn=document.getElementById('startGame'),modePill=document.getElementById('modePill'),basketPill=document.getElementById('basketPill'),timePill=document.getElementById('timePill'),messageBox=document.getElementById('message'),actionBtn=document.getElementById('actionBtn'),restartBtn=document.getElementById('restartBtn'),joyArea=document.getElementById('joyArea'),joyBase=document.getElementById('joyBase'),joyKnob=document.getElementById('joyKnob');
let W=390,H=700,SCALE=1,state='menu',last=performance.now(),msgTimer=0,actionBuffer=0,nearStation=null,mini=null,particles=[];
const keys={up:false,down:false,left:false,right:false,action:false},joy={x:0,y:0,active:false,pointerId:null},basket={strawberry:0,lemon:0,plum:0,heart:0},played={strawberry:false,lemon:false,plum:false},turtle={x:W*.5,y:H*.67,r:23,face:1,bob:0};
const stations=[{id:'strawberry',label:'Çilek Tarlası',emoji:'🍓',rx:.20,ry:.23,color:'#ff8ca4',desc:'Parlayan çalıları hatırla. Toplamak için BAŞLA/TOPLA tuşuna bas.'},{id:'lemon',label:'Limon Ağacı',emoji:'🍋',rx:.50,ry:.21,color:'#ffd861',desc:'Dallardan düşen limonları yakala, çürüklerden kaç.'},{id:'plum',label:'Erik Labirenti',emoji:'🟣',rx:.80,ry:.26,color:'#b790ff',desc:'Her erikten sonra engeller yeniden dizilir.'},{id:'final',label:'Piknik Alanı',emoji:'❤️',rx:.50,ry:.72,color:'#ffb2bf',desc:'Sepeti açıp final pikniğine git.'}];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rand=(a,b)=>a+Math.random()*(b-a),dist=(a,b,c,d)=>Math.hypot(a-c,b-d),stationX=s=>s.rx*W,stationY=s=>s.ry*H,moveSpeed=()=>clamp(Math.min(W,H)*.55,165,260);
function resizeCanvas(){const r=canvas.getBoundingClientRect(),dpr=Math.min(window.devicePixelRatio||1,2);W=Math.max(280,Math.floor(r.width));H=Math.max(420,Math.floor(r.height));canvas.width=Math.floor(W*dpr);canvas.height=Math.floor(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);SCALE=clamp(W/430,.72,1.05);turtle.x=clamp(turtle.x||W*.5,42,W-42);turtle.y=clamp(turtle.y||H*.67,70,H-42)}
window.addEventListener('resize',resizeCanvas);window.addEventListener('orientationchange',()=>setTimeout(resizeCanvas,250));resizeCanvas();
function axis(){let x=joy.x+(keys.right?1:0)-(keys.left?1:0),y=joy.y+(keys.down?1:0)-(keys.up?1:0);const l=Math.hypot(x,y);if(l>1){x/=l;y/=l}return{x,y}}
function setJoystickFromEvent(e){const r=joyBase.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,max=32;let dx=e.clientX-cx,dy=e.clientY-cy,l=Math.hypot(dx,dy);if(l>max){dx=dx/l*max;dy=dy/l*max}joy.x=dx/max;joy.y=dy/max;joyKnob.style.transform=`translate(${dx}px,${dy}px)`}
function resetJoystick(){joy.x=0;joy.y=0;joy.active=false;joy.pointerId=null;joyKnob.style.transform='translate(0,0)'}
joyArea.addEventListener('pointerdown',e=>{e.preventDefault();joy.active=true;joy.pointerId=e.pointerId;joyArea.setPointerCapture(e.pointerId);setJoystickFromEvent(e)});joyArea.addEventListener('pointermove',e=>{if(!joy.active||e.pointerId!==joy.pointerId)return;e.preventDefault();setJoystickFromEvent(e)});joyArea.addEventListener('pointerup',e=>{if(e.pointerId===joy.pointerId)resetJoystick()});joyArea.addEventListener('pointercancel',resetJoystick);joyArea.addEventListener('lostpointercapture',resetJoystick);
function requestAction(){keys.action=true;actionBuffer=.18}function showMessage(t,s=3){messageBox.textContent=t;messageBox.classList.add('show');msgTimer=s}function pop(x,y,t){particles.push({x,y,text:t,life:1,vy:-48,size:22*SCALE})}
function updateHud(){const total=basket.strawberry+basket.lemon+basket.plum;basketPill.textContent=`Sepet: 🍓${basket.strawberry} 🍋${basket.lemon} 🟣${basket.plum} ❤️${basket.heart}`;if(state==='map'){modePill.textContent='🐢 Bahçe';timePill.textContent=total>=18?'Piknik hazır':`${total}/18`;actionBtn.textContent=nearStation?(nearStation.id==='final'?'PİKNİK':'BAŞLA'):'BAŞLA'}else if(mini){timePill.textContent=`${Math.ceil(mini.time)} sn`;actionBtn.textContent=state==='strawberry'?'TOPLA':'BAŞLA'}else if(state==='final'){modePill.textContent='❤️ Piknik';timePill.textContent='Mutlu son';actionBtn.textContent='DÖN'}else{timePill.textContent='Süre: -';actionBtn.textContent='BAŞLA'}}
function drawRoundedRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}function drawText(t,x,y,s=18,a='center',c='#4b3b2f',w='700'){ctx.save();ctx.font=`${w} ${s}px system-ui, sans-serif`;ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillStyle=c;ctx.fillText(t,x,y);ctx.restore()}function wrapText(t,x,y,mw,fs,lh){ctx.save();ctx.font=`800 ${fs}px system-ui, sans-serif`;ctx.fillStyle='#4b3b2f';ctx.textAlign='center';ctx.textBaseline='middle';const words=t.split(' '),lines=[];let line='';for(const word of words){const test=line?`${line} ${word}`:word;if(ctx.measureText(test).width>mw&&line){lines.push(line);line=word}else line=test}if(line)lines.push(line);const sy=y-(lines.length-1)*lh/2;lines.forEach((l,i)=>ctx.fillText(l,x,sy+i*lh));ctx.restore()}
function drawBackground(){ctx.clearRect(0,0,W,H);const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#fff1be');g.addColorStop(.45,'#dff3c8');g.addColorStop(1,'#b9e7c2');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.25)';for(let i=0;i<24;i++){const x=(i*97+W*.11)%W,y=(i*137+H*.13)%H;ctx.beginPath();ctx.ellipse(x,y,24*SCALE+(i%4)*5,9*SCALE+(i%3)*3,(i%5)*.4,0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(143,111,65,.15)';ctx.lineWidth=18*SCALE;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(W*.11,H*.78);ctx.bezierCurveTo(W*.25,H*.56,W*.32,H*.40,W*.50,H*.45);ctx.bezierCurveTo(W*.68,H*.50,W*.74,H*.64,W*.89,H*.77);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,.34)';ctx.lineWidth=7*SCALE;ctx.beginPath();ctx.moveTo(W*.11,H*.78);ctx.bezierCurveTo(W*.25,H*.56,W*.32,H*.40,W*.50,H*.45);ctx.bezierCurveTo(W*.68,H*.50,W*.74,H*.64,W*.89,H*.77);ctx.stroke()}
function drawTurtle(x,y,s=1,m='normal'){s*=SCALE;ctx.save();ctx.translate(x,y+Math.sin(turtle.bob)*2*s);ctx.scale(s*turtle.face,s);ctx.fillStyle='#82bf63';ctx.beginPath();ctx.ellipse(26,-6,16,14,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#5f9f51';ctx.beginPath();ctx.ellipse(4,0,32,24,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#97d46f';ctx.beginPath();ctx.ellipse(4,0,23,17,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(65,93,51,.35)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-10,-12);ctx.lineTo(14,12);ctx.moveTo(14,-12);ctx.lineTo(-10,12);ctx.stroke();ctx.fillStyle='#77b85e';for(const f of [[-18,-18],[-18,18],[15,-18],[15,18]]){ctx.beginPath();ctx.ellipse(f[0],f[1],9,6,0,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#29351f';ctx.beginPath();ctx.arc(31,-10,2.3,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#29351f';ctx.lineWidth=2;ctx.beginPath();if(m==='happy')ctx.arc(33,-4,5,.15,Math.PI-.15);else ctx.arc(33,-3,4,.2,Math.PI-.2);ctx.stroke();ctx.restore()}
function drawStation(st){const x=stationX(st),y=stationY(st),isNear=nearStation&&nearStation.id===st.id,done=played[st.id],outer=(isNear?58:50)*SCALE,inner=32*SCALE;ctx.save();ctx.globalAlpha=st.id==='final'&&basket.strawberry+basket.lemon+basket.plum<6?.62:1;ctx.fillStyle=isNear?'rgba(255,255,255,.75)':'rgba(255,255,255,.48)';ctx.strokeStyle=isNear?'#fff':'rgba(255,255,255,.55)';ctx.lineWidth=4*SCALE;ctx.beginPath();ctx.arc(x,y,outer,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle=st.color;ctx.beginPath();ctx.arc(x,y,inner,0,Math.PI*2);ctx.fill();drawText(st.emoji,x,y-2*SCALE,30*SCALE);drawText(done?`${st.label} ✓`:st.label,x,y+52*SCALE,14*SCALE,'center','#4b3b2f','800');if(isNear)drawText(st.id==='final'?'Pikniğe git':'Mini oyuna başla',x,y+72*SCALE,12*SCALE,'center','#6d5b44','700');ctx.restore()}
function updateMap(dt){const a=axis();if(a.x||a.y){turtle.x+=a.x*moveSpeed()*dt;turtle.y+=a.y*moveSpeed()*dt;if(Math.abs(a.x)>.1)turtle.face=a.x>0?1:-1}turtle.x=clamp(turtle.x,38*SCALE,W-38*SCALE);turtle.y=clamp(turtle.y,48*SCALE,H-38*SCALE);turtle.bob+=(a.x||a.y?10:4)*dt;nearStation=null;for(const st of stations)if(dist(turtle.x,turtle.y,stationX(st),stationY(st))<70*SCALE)nearStation=st;if(keys.action&&nearStation){keys.action=false;actionBuffer=0;if(nearStation.id==='final')startFinal();else startMini(nearStation.id)}}
function drawMap(){drawBackground();for(let i=0;i<36;i++){const x=(i*73+45)%W,y=(i*129+93)%H;ctx.fillStyle=i%2?'rgba(255,168,184,.35)':'rgba(255,255,255,.35)';ctx.beginPath();ctx.arc(x,y,(3+(i%3))*SCALE,0,Math.PI*2);ctx.fill()}stations.forEach(drawStation);drawTurtle(turtle.x,turtle.y);if(nearStation){const pw=Math.min(W-28,500*SCALE);ctx.save();drawRoundedRect(W/2-pw/2,H-62*SCALE,pw,44*SCALE,18*SCALE);ctx.fillStyle='rgba(255,255,255,.66)';ctx.fill();wrapText(`${nearStation.emoji} ${nearStation.desc}`,W/2,H-40*SCALE,pw-18*SCALE,12.5*SCALE,14*SCALE);ctx.restore()}}
function startMini(id){if(id==='lemon'){state='lemon';modePill.textContent='🍋 Limon';mini={id,time:45,items:[],spawn:0,score:0,x:W/2,speed:clamp(W*.72,250,360),slow:0};showMessage('Limonlar artık dallardan düşüyor. Yaprak -2 sn, çürük limon -1 puan.',3)}if(id==='plum'){state='plum';modePill.textContent='🟣 Erik';mini=createPlumMini();showMessage('Her erikten sonra erik, diken ve salyangozlar yeniden dizilecek.',3)}if(id==='strawberry'){state='strawberry';modePill.textContent='🍓 Çilek';mini=createStrawberryMini();showMessage('Parlayan çalıları ezberle. Toplamak için TOPLA tuşuna bas.',3)}}
function restartCurrent(){if(state==='lemon'||state==='plum'||state==='strawberry'){const id=state;startMini(id);showMessage('Mini oyun yeniden başladı.',2)}else{basket.strawberry=0;basket.lemon=0;basket.plum=0;basket.heart=0;played.strawberry=played.lemon=played.plum=false;state='map';mini=null;turtle.x=W*.5;turtle.y=H*.67;showMessage('Test reseti: sepet boşaldı, bahçeye döndün.',3)}}restartBtn.addEventListener('click',restartCurrent);
function endMini(){if(!mini)return;if(mini.id==='lemon'){basket.lemon+=mini.score;basket.heart+=Math.floor(mini.score/10);played.lemon=true;showMessage(`${mini.score} limon sepete girdi. Limonata ihtimali güçlendi.`,4)}if(mini.id==='plum'){basket.plum+=mini.score;basket.heart+=Math.floor(mini.score/7);played.plum=true;showMessage(`${mini.score} erik toplandı. Sepetin mor tarafı gururlu.`,4)}if(mini.id==='strawberry'){basket.strawberry+=mini.score;basket.heart+=mini.hearts+Math.floor(mini.score/8);played.strawberry=true;showMessage(`${mini.score} çilek ve ${mini.hearts} kalp çileği bulundu. Sepet kızardı.`,4)}state='map';mini=null;turtle.x=W*.5;turtle.y=H*.67}
function updateLemon(dt){
  if(mini.windPhase===undefined){
    mini.windPhase=0;
    mini.wind=0;
    mini.difficulty=1;
  }

  mini.time-=dt;

  if(mini.time<=0){
    return endMini();
  }

  mini.difficulty=1+Math.floor((45-mini.time)/10);

  if(mini.slow>0){
    mini.slow-=dt;
  }

  mini.windPhase+=dt*.85;
  mini.wind=Math.sin(mini.windPhase)*26+Math.sin(mini.windPhase*2.1)*10;

  const a=axis();
  const speed=mini.speed*(mini.slow>0?.55:1);

  mini.x+=a.x*speed*dt;
  mini.x=clamp(mini.x,44*SCALE,W-44*SCALE);

  if(Math.abs(a.x)>.1){
    turtle.face=a.x>0?1:-1;
  }

  turtle.bob+=(Math.abs(a.x)>.05?10:3)*dt;

  mini.spawn-=dt;

  if(mini.spawn<=0){
    const branches=[
      {x:W*.22,y:95*SCALE},
      {x:W*.34,y:82*SCALE},
      {x:W*.50,y:72*SCALE},
      {x:W*.66,y:82*SCALE},
      {x:W*.78,y:96*SCALE}
    ];

    const branch=branches[Math.floor(Math.random()*branches.length)];
    const roll=Math.random();

    let type='lemon';

    if(roll>.93){
      type='gold';
    }else if(roll>.77){
      type='leaf';
    }else if(roll>.63){
      type='rotten';
    }

    mini.items.push({
      x:branch.x+rand(-22*SCALE,22*SCALE),
      y:branch.y+rand(-8*SCALE,12*SCALE),
      vx:rand(-22,22)+mini.wind*.35,
      vy:rand(145,230)+(mini.difficulty-1)*18,
      type,
      rot:rand(-1,1),
      wobble:rand(0,10)
    });

    mini.spawn=clamp(rand(.34,.64)-mini.difficulty*.035,.22,.60);
  }

  for(const item of mini.items){
    item.wobble+=dt*4;
    item.x+=(item.vx+mini.wind*.32+Math.sin(item.wobble)*10)*dt;
    item.y+=item.vy*dt;
    item.rot+=dt;

    item.x=clamp(item.x,18*SCALE,W-18*SCALE);

    const catchWidth=32*SCALE;

    if(
      item.y>H-72*SCALE&&
      Math.abs(item.x-mini.x)<catchWidth&&
      item.y<H-24*SCALE
    ){
      item.dead=true;

      if(item.type==='gold'){
        mini.score+=3;
        pop(item.x,item.y,'+3 🍋');
      }

      if(item.type==='lemon'){
        mini.score+=1;
        pop(item.x,item.y,'+1 🍋');
      }

      if(item.type==='leaf'){
        mini.time=Math.max(0,mini.time-2);
        mini.slow=1.1;
        pop(item.x,item.y,'-2 sn 🍃');
      }

      if(item.type==='rotten'){
        mini.score=Math.max(0,mini.score-1);
        mini.slow=.65;
        pop(item.x,item.y,'-1 🤢');
      }
    }

    if(item.y>H+40){
      item.dead=true;
    }
  }

  mini.items=mini.items.filter(i=>!i.dead);
}
function drawLemon(){
  ctx.fillStyle='#cceebb';
  ctx.fillRect(0,0,W,H);

  ctx.save();

  ctx.strokeStyle='#7a5a32';
  ctx.lineWidth=10*SCALE;
  ctx.lineCap='round';
  ctx.lineJoin='round';

  ctx.beginPath();
  ctx.moveTo(W*.5,190*SCALE);
  ctx.lineTo(W*.5,82*SCALE);

  ctx.moveTo(W*.5,108*SCALE);
  ctx.lineTo(W*.18,78*SCALE);

  ctx.moveTo(W*.5,104*SCALE);
  ctx.lineTo(W*.82,74*SCALE);

  ctx.moveTo(W*.5,132*SCALE);
  ctx.lineTo(W*.25,142*SCALE);

  ctx.moveTo(W*.5,130*SCALE);
  ctx.lineTo(W*.75,142*SCALE);

  ctx.moveTo(W*.38,96*SCALE);
  ctx.lineTo(W*.30,60*SCALE);

  ctx.moveTo(W*.62,94*SCALE);

function createPlumMini(){
  const grid=[
    '11111111111',
    '10001000001',
    '10101011101',
    '10100010001',
    '10111010111',
    '10000010001',
    '11101110101',
    '10001000101',
    '10111011101',
    '10000000001',
    '11111111111'
  ];

  const rows=grid.length;
  const cols=grid[0].length;

  const cell=Math.floor(
    Math.min(
      (W-26)/cols,
      (H-122*SCALE)/rows,
      42*SCALE
    )
  );

  const m={
    id:'plum',
    time:60,
    score:0,
    level:1,
    grid,
    cell,
    ox:(W-cols*cell)/2,
    oy:74*SCALE,
    player:{
      cx:1,
      cy:1,
      px:0,
      py:0,
      moveT:0,
      fromX:1,
      fromY:1,
      toX:1,
      toY:1,
      startX:1,
      startY:1
    },
    plum:{cx:7,cy:5},
    hazards:[],
    snails:[],
    reservedPath:new Set(),
    snailTick:0,
    snailStep:1.15
  };

  m.player.px=m.ox+m.player.cx*m.cell+m.cell/2;
  m.player.py=m.oy+m.player.cy*m.cell+m.cell/2;

  resetPlumBoard(m);

  return m;
}

function cellKey(x,y){
  return x+','+y;
}

function shuffleCells(arr){
  return arr
    .map(v=>({v,sort:Math.random()}))
    .sort((a,b)=>a.sort-b.sort)
    .map(o=>o.v);
}

function plumOpenCells(m){
  const cells=[];

  for(let y=0;y<m.grid.length;y++){
    for(let x=0;x<m.grid[y].length;x++){
      if(m.grid[y][x]==='0'){
        cells.push({x,y});
      }
    }
  }

  return cells;
}

function hazardSetFrom(list){
  const s=new Set();

  for(const h of list){
    s.add(cellKey(h.cx,h.cy));
  }

  return s;
}

function findPlumPath(m,start,target,hazards){
  const bad=hazardSetFrom(hazards);
  const q=[start];
  const seen=new Set([cellKey(start.x,start.y)]);
  const parent=new Map();

  while(q.length){
    const c=q.shift();

    if(c.x===target.x&&c.y===target.y){
      const path=[];
      let cur=cellKey(c.x,c.y);

      while(cur){
        const [x,y]=cur.split(',').map(Number);
        path.push({x,y});
        cur=parent.get(cur);
      }

      return path.reverse();
    }

    for(const d of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=c.x+d[0];
      const ny=c.y+d[1];
      const k=cellKey(nx,ny);

      if(seen.has(k))continue;
      if(bad.has(k))continue;

      if(m.grid[ny]&&m.grid[ny][nx]==='0'){
        seen.add(k);
        parent.set(k,cellKey(c.x,c.y));
        q.push({x:nx,y:ny});
      }
    }
  }

  return null;
}

function reachablePlumCells(m,hazards){
  const bad=hazardSetFrom(hazards);
  const start={x:m.player.cx,y:m.player.cy};
  const q=[start];
  const seen=new Set([cellKey(start.x,start.y)]);
  const out=[];

  while(q.length){
    const c=q.shift();
    out.push(c);

    for(const d of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=c.x+d[0];
      const ny=c.y+d[1];
      const k=cellKey(nx,ny);

      if(seen.has(k))continue;
      if(bad.has(k))continue;

      if(m.grid[ny]&&m.grid[ny][nx]==='0'){
        seen.add(k);
        q.push({x:nx,y:ny});
      }
    }
  }

  return out;
}

function occupiedPlumCell(m,x,y){
  if(m.player.cx===x&&m.player.cy===y)return true;
  if(m.plum.cx===x&&m.plum.cy===y)return true;
  if(m.hazards.some(h=>h.cx===x&&h.cy===y))return true;
  if(m.snails.some(s=>s.cx===x&&s.cy===y))return true;

  return false;
}

function resetPlumBoard(m){
  m.level=1+Math.floor(m.score/2);
  m.snailStep=Math.max(.36,1.15-m.score*.07);

  const hazardCount=clamp(3+Math.floor(m.score/2),3,7);
  const snailCount=clamp(1+Math.floor(m.score/2),1,5);

  const all=plumOpenCells(m).filter(c=>{
    if(c.x===m.player.cx&&c.y===m.player.cy)return false;
    if(c.x<3&&c.y<3)return false;

    return true;
  });

  let chosen=null;

  for(let attempt=0;attempt<100;attempt++){
    const hazards=[];

    for(const c of shuffleCells(all)){
      if(hazards.length>=hazardCount)break;

      hazards.push({cx:c.x,cy:c.y});
    }

    const reachable=reachablePlumCells(m,hazards).filter(c=>{
      if(c.x===m.player.cx&&c.y===m.player.cy)return false;
      if(c.x<2&&c.y<2)return false;

      return true;
    });

    if(reachable.length<5)continue;

    const far=reachable
      .map(c=>({
        ...c,
        d:Math.abs(c.x-m.player.cx)+Math.abs(c.y-m.player.cy)
      }))
      .sort((a,b)=>b.d-a.d);

    const plumPool=far.slice(0,Math.max(1,Math.ceil(far.length*.45)));
    const plum=plumPool[Math.floor(Math.random()*plumPool.length)];

    const path=findPlumPath(
      m,
      {x:m.player.cx,y:m.player.cy},
      {x:plum.x,y:plum.y},
      hazards
    );

    if(!path||path.length<4)continue;

    chosen={hazards,plum,path};
    break;
  }

  if(!chosen){
    chosen={
      hazards:[],
      plum:{x:9,y:9},
      path:findPlumPath(m,{x:m.player.cx,y:m.player.cy},{x:9,y:9},[])||[]
    };
  }

  m.hazards=chosen.hazards;
  m.plum.cx=chosen.plum.x;
  m.plum.cy=chosen.plum.y;
  m.reservedPath=new Set(chosen.path.map(c=>cellKey(c.x,c.y)));

  m.snails=[];

  const reachable=reachablePlumCells(m,m.hazards);

  const snailPool=shuffleCells(
    reachable.filter(c=>{
      if(occupiedPlumCell(m,c.x,c.y))return false;
      if(m.reservedPath.has(cellKey(c.x,c.y)))return false;

      const nearPlayer=Math.abs(c.x-m.player.cx)+Math.abs(c.y-m.player.cy);
      const nearPlum=Math.abs(c.x-m.plum.cx)+Math.abs(c.y-m.plum.cy);

      if(nearPlayer<3)return false;
      if(nearPlum<2)return false;

      return true;
    })
  );

  for(let i=0;i<snailCount&&i<snailPool.length;i++){
    m.snails.push({
      cx:snailPool[i].x,
      cy:snailPool[i].y,
      dir:Math.random()<.5?1:-1,
      axis:Math.random()<.5?'x':'y'
    });
  }

  m.snailTick=m.snailStep;
}

function isHazardCell(m,x,y){
  return m.hazards.some(h=>h.cx===x&&h.cy===y);
}

function isPlumOpen(m,x,y){
  if(!(m.grid[y]&&m.grid[y][x]==='0'))return false;
  if(isHazardCell(m,x,y))return false;
  if(m.reservedPath.has(cellKey(x,y)))return false;
  if(x===m.plum.cx&&y===m.plum.cy)return false;
  if(x===m.player.cx&&y===m.player.cy)return false;

  return true;
}

function sendPlumStart(){
  const p=mini.player;

  p.cx=p.startX;
  p.cy=p.startY;
  p.fromX=p.cx;
  p.fromY=p.cy;
  p.toX=p.cx;
  p.toY=p.cy;
  p.moveT=0;

  p.px=mini.ox+p.cx*mini.cell+mini.cell/2;
  p.py=mini.oy+p.cy*mini.cell+mini.cell/2;
}

function checkPlumDanger(){
  const p=mini.player;

  if(isHazardCell(mini,p.cx,p.cy)){
    mini.time=Math.max(0,mini.time-2);
    pop(p.px,p.py,'-2 sn 🌵');

    p.cx=p.fromX;
    p.cy=p.fromY;
    p.toX=p.cx;
    p.toY=p.cy;
    p.moveT=0;

    p.px=mini.ox+p.cx*mini.cell+mini.cell/2;
    p.py=mini.oy+p.cy*mini.cell+mini.cell/2;

    return;
  }

  for(const s of mini.snails){
    if(s.cx===p.cx&&s.cy===p.cy){
      mini.time=Math.max(0,mini.time-3);
      pop(p.px,p.py,'-3 sn 🐌');
      sendPlumStart();

      return;
    }
  }
}

function moveSnails(dt){
  mini.snailTick-=dt;

  if(mini.snailTick>0)return;

  mini.snailTick=mini.snailStep;

  for(const s of mini.snails){
    const nx=s.cx+(s.axis==='x'?s.dir:0);
    const ny=s.cy+(s.axis==='y'?s.dir:0);

    if(isPlumOpen(mini,nx,ny)){
      s.cx=nx;
      s.cy=ny;
    }else{
      s.dir*=-1;

      if(Math.random()<.38){
        s.axis=s.axis==='x'?'y':'x';
      }
    }
  }
}

function updatePlum(dt){
  mini.time-=dt;

  if(mini.time<=0){
    return endMini();
  }

  moveSnails(dt);

  const p=mini.player;

  if(p.moveT>0){
    p.moveT-=dt*7.5;

    const t=1-Math.max(0,p.moveT);
    const sm=t*t*(3-2*t);

    p.px=mini.ox+(p.fromX+(p.toX-p.fromX)*sm)*mini.cell+mini.cell/2;
    p.py=mini.oy+(p.fromY+(p.toY-p.fromY)*sm)*mini.cell+mini.cell/2;

    if(p.moveT<=0){
      p.cx=p.toX;
      p.cy=p.toY;

      p.px=mini.ox+p.cx*mini.cell+mini.cell/2;
      p.py=mini.oy+p.cy*mini.cell+mini.cell/2;

      checkPlumDanger();
    }
  }else{
    const a=axis();

    let nx=p.cx;
    let ny=p.cy;

    if(Math.abs(a.x)>Math.abs(a.y)){
      if(a.x<-.35)nx--;
      else if(a.x>.35)nx++;
    }else{
      if(a.y<-.35)ny--;
      else if(a.y>.35)ny++;
    }

    if(nx!==p.cx||ny!==p.cy){
      if(mini.grid[ny]&&mini.grid[ny][nx]==='0'){
        p.fromX=p.cx;
        p.fromY=p.cy;
        p.toX=nx;
        p.toY=ny;
        p.moveT=1;

        if(nx>p.cx)turtle.face=1;
        if(nx<p.cx)turtle.face=-1;
      }
    }
  }

  if(p.cx===mini.plum.cx&&p.cy===mini.plum.cy&&p.moveT<=0){
    mini.score++;
    pop(p.px,p.py,'+1 🟣');

    resetPlumBoard(mini);

    pop(p.px,p.py-18*SCALE,'Kademe yükseldi');
  }

  turtle.bob+=7*dt;
}

function strawberryDifficulty(wave){
  return {
    bushCount:clamp(8+wave*2,10,24),
    targetCount:clamp(2+Math.ceil(wave*.75),3,9),
    preview:clamp(3.4-wave*.32,1.15,3)
  };
}

function createStrawberryBushes(count){
  const bushes=[];
  let tries=0;

  const minDistance=clamp((82-count*1.55)*SCALE,42*SCALE,68*SCALE);

  while(bushes.length<count&&tries<1400){
    tries++;

    const b={
      x:rand(46*SCALE,W-46*SCALE),
      y:rand(98*SCALE,H-58*SCALE),
      target:false,
      heart:false,
      found:false,
      wrong:false,
      snail:0,
      wiggle:rand(0,10)
    };

    if(bushes.every(o=>dist(o.x,o.y,b.x,b.y)>minDistance)){
      bushes.push(b);
    }
  }

  while(bushes.length<count){
    bushes.push({
      x:rand(46*SCALE,W-46*SCALE),
      y:rand(98*SCALE,H-58*SCALE),
      target:false,
      heart:false,
      found:false,
      wrong:false,
      snail:0,
      wiggle:rand(0,10)
    });
  }

  return bushes;
}

function createStrawberryMini(){
  const m={
    id:'strawberry',
    time:55,
    score:0,
    hearts:0,
    bushes:[],
    x:W/2,
    y:H*.68,
    speed:moveSpeed(),
    wave:0,
    preview:0,
    previewMax:0,
    remaining:0,
    combo:0,
    slow:0,
    cooldown:0,
    currentBushCount:0,
    currentTargetCount:0
  };

  newStrawberryWave(m);

  return m;
}

function newStrawberryWave(m){
  m.wave++;

  const d=strawberryDifficulty(m.wave);

  m.currentBushCount=d.bushCount;
  m.currentTargetCount=Math.min(d.targetCount,d.bushCount-1);
  m.preview=d.preview;
  m.previewMax=d.preview;
  m.remaining=m.currentTargetCount;
  m.cooldown=0;

  m.bushes=createStrawberryBushes(m.currentBushCount);

  const choices=shuffleCells([...m.bushes]).slice(0,m.currentTargetCount);

  for(const b of choices){
    b.target=true;
    b.heart=Math.random()<.16;
  }
}

function nearestBush(m){
  let best=null;
  let bd=9999;

  for(const b of m.bushes){
    const d=dist(m.x,m.y,b.x,b.y);

    if(d<bd){
      bd=d;
      best=b;
    }
  }

  return {b:best,d:bd};
}

function inspectStrawberryBush(){
  if(mini.preview>0||mini.cooldown>0)return;

  const n=nearestBush(mini);
  const b=n.b;

  if(!b||n.d>34*SCALE){
    pop(mini.x,mini.y-22*SCALE,'Yaklaş');
    return;
  }

  if(b.target&&!b.found){
    b.found=true;

    mini.score++;
    mini.remaining--;
    mini.combo++;

    if(b.heart){
      mini.hearts++;
      pop(b.x,b.y,'+1 ❤️🍓');
    }else{
      pop(b.x,b.y,'+1 🍓');
    }

    if(mini.combo>0&&mini.combo%3===0){
      mini.score+=2;
      pop(b.x,b.y-18*SCALE,'Kombo +2!');
    }

    if(mini.remaining<=0){
      mini.cooldown=.55;
      pop(mini.x,mini.y-28*SCALE,'Yeni koku geliyor');
    }
  }else if(!b.target&&!b.wrong){
    b.wrong=true;
    b.snail=1.4;

    mini.combo=0;
    mini.slow=.95;
    mini.time=Math.max(0,mini.time-1.5);

    pop(b.x,b.y,'-1.5 sn 🐌');
  }
}

function updateStrawberry(dt){
  mini.time-=dt;

  if(mini.time<=0){
    return endMini();
  }

  if(mini.cooldown>0){
    mini.cooldown-=dt;

    if(mini.cooldown<=0){
      newStrawberryWave(mini);
    }
  }

  if(mini.preview>0){
    mini.preview-=dt;
  }

  if(mini.slow>0){
    mini.slow-=dt;
  }

  const a=axis();
  const speed=mini.speed*(mini.slow>0?.58:1);

  if(a.x||a.y){
    mini.x+=a.x*speed*dt;
    mini.y+=a.y*speed*dt;

    if(Math.abs(a.x)>.1){
      turtle.face=a.x>0?1:-1;
    }
  }

  mini.x=clamp(mini.x,34*SCALE,W-34*SCALE);
  mini.y=clamp(mini.y,62*SCALE,H-34*SCALE);

  turtle.bob+=(a.x||a.y?10:4)*dt;

  for(const b of mini.bushes){
    b.wiggle+=.025;

    if(b.snail>0){
      b.snail-=dt;
    }
  }

  if(keys.action){
    keys.action=false;
    actionBuffer=0;
    inspectStrawberryBush();
  }
}

function drawBush(b){
  const near=dist(mini.x,mini.y,b.x,b.y)<58*SCALE&&!b.found&&!b.wrong;
  const visible=b.target&&(mini.preview>0||b.found);
  const hint=b.target&&!b.found&&mini.preview<=0&&near;

  ctx.save();

  ctx.translate(b.x,b.y+Math.sin(b.wiggle)*2);

  ctx.fillStyle=b.wrong
    ?'rgba(126,142,86,.45)'
    :near
      ?'#8fd179'
      :'#78bd65';

  ctx.beginPath();
  ctx.ellipse(-10*SCALE,0,16*SCALE,10*SCALE,-.5,0,Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(9*SCALE,0,18*SCALE,11*SCALE,.5,0,Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(0,-7*SCALE,16*SCALE,10*SCALE,0,0,Math.PI*2);
  ctx.fill();

  if(visible||hint){
    ctx.strokeStyle=b.heart
      ?'rgba(255,120,150,.95)'
      :'rgba(255,255,255,.9)';

    ctx.lineWidth=3*SCALE;

    ctx.beginPath();
    ctx.arc(0,0,28*SCALE,0,Math.PI*2);
    ctx.stroke();
  }

  if(visible){
    if(b.heart){
      drawText('❤️',0,-12*SCALE,15*SCALE);
    }

    ctx.fillStyle='#ff6680';

    ctx.beginPath();
    ctx.moveTo(0,14*SCALE);
    ctx.bezierCurveTo(-16*SCALE,-4*SCALE,-8*SCALE,-18*SCALE,0,-10*SCALE);
    ctx.bezierCurveTo(8*SCALE,-18*SCALE,16*SCALE,-4*SCALE,0,14*SCALE);
    ctx.fill();

    ctx.fillStyle='#fff1a6';
    ctx.fillRect(-3*SCALE,-2*SCALE,2*SCALE,2*SCALE);
    ctx.fillRect(4*SCALE,2*SCALE,2*SCALE,2*SCALE);
    ctx.fillRect(-7*SCALE,5*SCALE,2*SCALE,2*SCALE);
  }

  if(b.snail>0){
    drawText('🐌',0,0,20*SCALE);
  }

  ctx.restore();
}

function drawStrawberry(){
  ctx.fillStyle='#cdefbc';
  ctx.fillRect(0,0,W,H);

  drawText(
    'Kokuyu Hatırla',
    W/2,
    30*SCALE,
    22*SCALE,
    'center',
    '#6a4a38',
    '900'
  );

  const info=mini.preview>0
    ?`Ezber: ${Math.max(0,mini.preview).toFixed(1)} sn`
    :'Yaklaş ve TOPLA';

  drawText(
    `${info}  •  Tur ${mini.wave}  •  Çalı ${mini.currentBushCount}  •  Çilek ${mini.currentTargetCount}`,
    W/2,
    54*SCALE,
    11.5*SCALE,
    'center',
    '#6d5b44',
    '800'
  );

  for(const b of mini.bushes){
    drawBush(b);
  }

  drawTurtle(mini.x,mini.y,.95,'happy');

  const combo=mini.combo>=2?`   Kombo: ${mini.combo}`:'';

  drawText(
    `Çilek: ${mini.score}  Kalp: ${mini.hearts}${combo}`,
    W/2,
    H-18*SCALE,
    15*SCALE,
    'center',
    '#4b3b2f',
    '800'
  );

  if(mini.slow>0){
    drawText(
      'Salyangoz çıktı, kaplumbağa ağırlaştı.',
      W/2,
      H-40*SCALE,
      12*SCALE,
      'center',
      '#6d5b44',
      '800'
    );
  }
}
function startFinal(){state='final';mini=null;nearStation=null;const total=basket.strawberry+basket.lemon+basket.plum;if(total<6)showMessage('Sepet biraz utangaç kaldı ama piknik yine de olur.',4);else showMessage('Sepet açılıyor. Kaplumbağa final pikniğine görev bilinciyle geldi.',4)}
function dominantFlavor(){const e=[['strawberry',basket.strawberry],['lemon',basket.lemon],['plum',basket.plum]].sort((a,b)=>b[1]-a[1]);if(e[0][1]===0)return'empty';if(Math.abs(e[0][1]-e[2][1])<=2&&e[2][1]>0)return'balanced';return e[0][0]}function finalText(){const d=dominantFlavor();if(basket.heart>=5)return'Kaplumbağa yol boyunca sadece yiyecek değil, küçük küçük sevgi de toplamış.';if(d==='balanced')return'Sepette her şeyden biraz var. Çünkü güzel şeyler tek tatla olmaz.';if(d==='strawberry')return'Bugün sepetin çilek kokuyor. Demek kalbin tatlı yoldan gelmiş.';if(d==='lemon')return'Biraz ekşi, biraz tatlı. Tam bizim hikâyemiz gibi.';if(d==='plum')return'Sepetin mor tarafı konuşuyor: bazı yollar labirenttir ama sonunda piknik vardır.';return'Sepet küçük olabilir ama kaplumbağanın niyeti kocaman.'}
function drawFinal(){const g=ctx.createRadialGradient(W/2,H/2,30,W/2,H/2,Math.max(W,H));g.addColorStop(0,'#fff7df');g.addColorStop(1,'#cfeec5');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);drawText('Piknik Sepeti Açıldı',W/2,48*SCALE,26*SCALE,'center','#4f7f43','900');const cw=Math.min(W*.82,420*SCALE),ch=Math.min(H*.26,190*SCALE);ctx.save();ctx.translate(W/2,H/2+10*SCALE);ctx.rotate(Math.sin(performance.now()/800)*.015);ctx.fillStyle='#ff9fb1';drawRoundedRect(-cw/2,-ch/2,cw,ch,24*SCALE);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=7*SCALE;ctx.beginPath();ctx.moveTo(-cw/2,0);ctx.lineTo(cw/2,0);ctx.moveTo(0,-ch/2);ctx.lineTo(0,ch/2);ctx.stroke();const foods=[];for(let i=0;i<Math.min(basket.strawberry,10);i++)foods.push('🍓');for(let i=0;i<Math.min(basket.lemon,10);i++)foods.push('🍋');for(let i=0;i<Math.min(basket.plum,10);i++)foods.push('🟣');for(let i=0;i<Math.min(basket.heart,6);i++)foods.push('❤️');if(!foods.length)foods.push('🐢');foods.forEach((f,i)=>{const cols=Math.max(4,Math.floor(cw/(46*SCALE))),x=-cw*.36+(i%cols)*42*SCALE,y=-ch*.25+Math.floor(i/cols)*38*SCALE;drawText(f,x,y,26*SCALE)});ctx.restore();drawTurtle(W*.22,H*.72,1.05,'happy');ctx.save();ctx.translate(W*.78,H*.72);drawText('R',0,-34*SCALE,20*SCALE,'center','#4b3b2f','900');ctx.fillStyle='#7fb4ff';ctx.beginPath();ctx.arc(0,0,24*SCALE,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4b3b2f';ctx.beginPath();ctx.arc(-7*SCALE,-5*SCALE,3*SCALE,0,Math.PI*2);ctx.arc(7*SCALE,-5*SCALE,3*SCALE,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#4b3b2f';ctx.lineWidth=2*SCALE;ctx.beginPath();ctx.arc(0,0,8*SCALE,.2,Math.PI-.2);ctx.stroke();ctx.restore();const bw=Math.min(W-28,720*SCALE);ctx.fillStyle='rgba(255,255,255,.72)';drawRoundedRect(W/2-bw/2,H-112*SCALE,bw,78*SCALE,24*SCALE);ctx.fill();wrapText(finalText(),W/2,H-84*SCALE,bw-24*SCALE,17*SCALE,19*SCALE);drawText('Haritaya dönmek için E / BAŞLA.',W/2,H-45*SCALE,12.5*SCALE,'center','#6d5b44','700');if(keys.action){keys.action=false;actionBuffer=0;state='map';showMessage('Bahçeye geri döndün. Sepeti büyütmek serbest.',3)}}
function updateParticles(dt){for(const p of particles){p.life-=dt;p.y+=p.vy*dt}particles=particles.filter(p=>p.life>0)}function drawParticles(){for(const p of particles){ctx.save();ctx.globalAlpha=Math.max(0,p.life);drawText(p.text,p.x,p.y,p.size,'center','#4b3b2f','900');ctx.restore()}}
function update(dt){if(actionBuffer>0){actionBuffer-=dt;if(actionBuffer<=0)keys.action=false}if(msgTimer>0){msgTimer-=dt;if(msgTimer<=0)messageBox.classList.remove('show')}if(state==='map')updateMap(dt);if(state==='lemon')updateLemon(dt);if(state==='plum')updatePlum(dt);if(state==='strawberry')updateStrawberry(dt);updateParticles(dt);updateHud()}function draw(){if(state==='menu')drawBackground();if(state==='map')drawMap();if(state==='lemon')drawLemon();if(state==='plum')drawPlum();if(state==='strawberry')drawStrawberry();if(state==='final')drawFinal();drawParticles()}function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}
function keyName(k){if(k==='ArrowUp'||k.toLowerCase()==='w')return'up';if(k==='ArrowDown'||k.toLowerCase()==='s')return'down';if(k==='ArrowLeft'||k.toLowerCase()==='a')return'left';if(k==='ArrowRight'||k.toLowerCase()==='d')return'right';if(k.toLowerCase()==='e'||k===' ')return'action';return null}window.addEventListener('keydown',e=>{const k=keyName(e.key);if(!k)return;e.preventDefault();if(k==='action')requestAction();else keys[k]=true});window.addEventListener('keyup',e=>{const k=keyName(e.key);if(!k)return;e.preventDefault();if(k!=='action')keys[k]=false});actionBtn.addEventListener('pointerdown',e=>{e.preventDefault();requestAction()});startGameBtn.addEventListener('click',()=>{overlay.classList.add('hidden');resizeCanvas();turtle.x=W*.5;turtle.y=H*.67;state='map';showMessage('Bahçeye hoş geldin. Bir alana yaklaş ve BAŞLA/E ile mini oyuna gir.',4)});requestAnimationFrame(loop);
})();
</script>
